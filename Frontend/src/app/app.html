<main class="page">
  <section class="card">
    <h1>Wyślij plik</h1>

    <form (ngSubmit)="submit()" class="form">
      <label for="fileName">Nazwa pliku</label>
      <input
        id="fileName"
        name="fileName"
        type="text"
        [(ngModel)]="fileName"
        placeholder="np. example.txt"
        required
      />

      <label for="fileInput">Plik</label>
      <input
        id="fileInput"
        name="fileInput"
        type="file"
        (change)="onFileSelected($event)"
        required
      />

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Wysyłanie...' : 'Wyślij plik' }}
      </button>
    </form>

    @if (statusMessage) {
      <p class="status" [class.error]="isError" [class.success]="!isError">{{ statusMessage }}</p>
    }
  </section>
</main>
